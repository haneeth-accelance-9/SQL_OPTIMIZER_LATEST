# LiscenceOptimizer Configuration
# SDK 1.2.0+

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

logging:
  level: "${LOG_LEVEL:INFO}"
  # Suppress noisy SDK adapter logs that can flood Loki
  loggers:
    agenticai.tools.adapters.microsoft: "WARNING"

# ============================================================================
# GATEWAY CONFIGURATIONS
# ============================================================================

# LLM Gateway Configuration - Azure OpenAI
# Note: only the config: dict is accepted in SDK 1.2.0+.
# The provider:, caching:, rate_limiting:, logging:, max_retries: fields
# were removed from the schema — passing them raises a Pydantic ValidationError.
llm:
  config:
    endpoint: "${AZURE_OPENAI_ENDPOINT}"
    deployment_name: "${AZURE_OPENAI_DEPLOYMENT_NAME:gpt-4o}"
    api_version: "${AZURE_OPENAI_API_VERSION:2024-12-01-preview}"
    use_managed_identity: false
    api_key: "${AZURE_OPENAI_API_KEY}"
    timeout: 600

# Memory Gateway Configuration - Cosmos DB
memory:
  provider: "cosmosdb"
  
  config:
    endpoint: "${COSMOSDB_ENDPOINT}"
    database_name: "${COSMOSDB_DATABASE_NAME:agenticai}"
    use_managed_identity: false
    key: "${COSMOSDB_KEY}"
    session_ttl_seconds: 2592000
    message_ttl_seconds: 2592000
  
  enable_history: true
  max_history_messages: 5

# Observability Configuration - SDK 1.2.0+ (OpenLIT + Grafana OTLP)
# OpenLIT is initialised automatically from this config before create_server().
# Set capture_message_content: true only in local dev to trace LLM prompts/responses.
observability:
  capture_message_content: false
  service_name: "${OTEL_SERVICE_NAME:liscence-optimizer}"
  service_version: "0.1.0"
  deployment_environment: "${DEPLOYMENT_ENVIRONMENT:development}"

  # Static labels attached to every span, metric, and log from this agent.
  # Add any team/squad/cell identifiers relevant to your agent here.
  # Values support ${ENV_VAR:default} substitution.
  resource_attributes: {}
  #   cell_identifier: "<your-cell-id>"
  #   beat_id: "${BEAT_ID:unknown}"
  #   app_squad: "<your-squad>"

  grafana:
    otlp_endpoint: "${RUNTIME_OTLP_ENDPOINT}"
    enable_logs: true
    headers: "${OTEL_EXPORTER_OTLP_HEADERS}"
    timeout: 10
    max_log_message_bytes: 200000

# ============================================================================
# EXECUTOR CONFIGURATION
# ============================================================================

executor:
  type: "phased_orchestration"
  streaming: true
  
  agents:
    - name: "main_agent"
      model:
        name: "${AZURE_OPENAI_DEPLOYMENT_NAME:gpt-4o}"
        type: "chat"
        max_tokens: 50000
        temperature: 0.0
      
      system_prompt: |
        You are an AI agent built with the AgenticAI SDK.
        
        **Your Purpose:**
        This agent creates executive summary or the results that are obtained by applying usecases on the data
        
        **Operational Guidelines:**
        - This is a fully autonomous agent that processes tasks independently
        - Make all decisions based on the data and requirements provided
        - Always explain your decisions and reasoning in your responses
        - Complete all phases from start to finish automatically
        
        **CRITICAL - Reasoning Format:**
        Before calling ANY tool, you MUST output your reasoning using EXACTLY this format:
        
        [REASONING]: Your explanation here in 1-2 sentences about what you're about to do and why.
        
        Example:
        [REASONING]: I need to read any attached JSON payload and then call the rules evaluation tool.
        
        Then call the tool. This format is REQUIRED for every single tool call.
      
      tools:
        # AgenticAI SDK built-in tools (registry varies by SDK build/extras — keep this list aligned
        # with what your environment actually registers, otherwise JSON-RPC calls fail at startup.)
        - "calculator"
        - "calculate_expression"
        - "calculate_statistics"
        - "read_file"
        - "read_file_content"
        # Local tools (this repo)
        - "evaluate_optimization_rules"
        - "report_generator"
        - "export_report"
        # Phase communication tools
        - "store_phase_result"
        - "get_phase_result"
        - "get_all_phase_results"
  
  phases:
    - name: "Analysis Phase"
      agent: "main_agent"
      number: 1
      instructions: |
        **Objective:** Normalize inputs and evaluate business rules from `configs/rules.base.yaml`.

        **Steps:**
        1. Extract `records_json` (a JSON **array** of objects) from the user message:
           - Preferred for API clients (Postman): the user message MUST include a fenced block between markers:
             `RECORDS_JSON_START` and `RECORDS_JSON_END` containing ONLY valid JSON (the array).
           - Alternative: user pastes a JSON array directly in the message (still must be valid JSON).
           - Alternative: a JSON file is attached → read with `read_file_content(filename=...)` and parse it.
           - Alternative: a raw file path is provided → read with `read_file(path=...)` and parse it.
           - Do NOT assume access to JSON-RPC `params.metadata` fields; the model may not see them.
        2. Call `evaluate_optimization_rules(records_json=...)` where `records_json` is a **string** whose content is the JSON array text.
        3. Store the returned JSON using `store_phase_result(phase_number=1, phase_name="Analysis Phase", result_data=<parsed dict>)` so Phase 2 can load it without re-stringifying the tool output.
    
    - name: "Report Generation Phase"
      agent: "main_agent"
      number: 2
      instructions: |
        **Objective:** Generate an executive summary scaffold from upstream strategy outputs + rule evaluation.

        **Steps:**
        1. Retrieve analysis results using `get_phase_result(phase_number=1)` (phase numbers are integers; there is no string name overload).
        2. Build `strategy_results_json` as a JSON object from the backend (counts, top examples, KPIs).
           - Preferred for API clients (Postman): include markers in the original user message:
             `STRATEGY_RESULTS_JSON_START` / `STRATEGY_RESULTS_JSON_END` wrapping ONLY valid JSON (an object).
           - If markers are absent, construct a minimal object from the Analysis Phase output (matched counts / summaries).
        3. Call `report_generator(usecase_id=..., strategy_results_json=...)`.
           - `strategy_results_json` must be a JSON **string** (stringified JSON object), not a raw object.
           - **Preferred:** omit `rules_evaluation_json` (or pass an empty string) so the tool loads Phase 1 rule evaluation from phase storage (`get_phase_result(1)`), avoiding huge pasted JSON that often breaks tool-call escaping.
           - **Optional override:** pass `rules_evaluation_json` as a stringified JSON object only if it is small and guaranteed valid.
        4. Optionally call `export_report` to save the markdown to a `.md` file for download.

# ============================================================================
# MCP SERVER CONFIGURATION (Optional)
# ============================================================================

# Model Context Protocol (MCP) server configuration for extending agents with custom tools
mcp:
  servers: []
    # ============================================================================
    # MCP SERVER CONFIGURATION - Per-Request Agent Pattern
    # ============================================================================
    # 
    # Authentication Behavior (Per-Request):
    # - Agents are created fresh for each request with current authentication
    # - Tokens are acquired at request time (no expiration issues)
    # - Tools are cleaned up after each request completes
    # 
    # Authentication Priority (evaluated per request):
    # 1. User token from RequestContext (if use_user_token_passthrough=true AND token provided)
    # 2. Fresh Managed Identity token (if use_managed_identity=true)
    # 3. Static headers from config
    # 
    # ============================================================================
    
    # Example 1: Managed Identity (Service-to-Service)
    # Use when: MCP server doesn't need user-specific permissions
    # - name: "analytics-mcp"
    #   description: "Analytics MCP server with data tools"
    #   transport: "http"
    #   endpoint: "${MCP_ANALYTICS_ENDPOINT:https://analytics-mcp.azurecontainer.io}"
    #   use_managed_identity: true
    #   audience: "api://analytics-mcp"  # Required for MI
    #   managed_identity_client_id: "${ANALYTICS_MCP_CLIENT_ID}"  # Optional: user-assigned MI
    #   enabled: true
    #   timeout: 30
    #   retry_attempts: 3
    
    # Example 2: User Token Passthrough (User-Scoped Access)
    # Use when: MCP server needs to act as the authenticated user
    # Requires: User token in RequestContext.authentication['bearer_token']
    # - name: "user-files-mcp"
    #   description: "User files MCP requiring user identity"
    #   transport: "http"
    #   endpoint: "${MCP_USER_FILES_ENDPOINT:https://user-files-mcp.azurecontainer.io}"
    #   use_user_token_passthrough: true
    #   # Note: Token acquired per-request from RequestContext
    #   # Works with: Azure Container Apps Easy Auth, Azure AD authentication
    #   enabled: true
    
    # Example 3: Hybrid Authentication (Priority Fallback)
    # Use when: Support both user-initiated requests and service automation
    # - name: "hybrid-mcp"
    #   description: "MCP with flexible authentication"
    #   transport: "http"
    #   endpoint: "${MCP_HYBRID_ENDPOINT:https://hybrid-mcp.azurecontainer.io}"
    #   use_user_token_passthrough: true  # Priority 1: Try user token first
    #   use_managed_identity: true        # Priority 2: Fallback to MI
    #   audience: "api://hybrid-mcp"      # Required for MI fallback
    #   # Behavior per request:
    #   # - If user token in RequestContext → use user token
    #   # - If no user token → acquire fresh MI token
    #   # - Both tokens are fresh (acquired per request, no expiration)

# ============================================================================
# A2A PROTOCOL CONFIGURATION
# ============================================================================

a2a:
  agent_card:
    name: "LiscenceOptimizer"
    description: "This agent creates executive summary or the results that are obtained by applying usecases on the data"
    url: "${AGENT_URL}"
  
  skills:
    - name: "analyze_data"
      description: "Analyze data and generate insights"
      output_type: "report"

# ============================================================================
# AUTHENTICATION CONFIGURATION
# ============================================================================

authentication:
  enabled: false  # Set to true for production deployment
  require_auth: false
  
  # Paths that don't require authentication
  public_paths:
    - "/.well-known/agent-card.json"
    - "/.well-known/agent.json"
    - "/health"
    - "/metrics"
    - "/docs"
    - "/openapi.json"
  
  # User authentication via Azure Container Apps Easy Auth
  user_auth:
    enabled: true
  
  # Service authentication via Bearer tokens (for Web Jobs)
  service_auth:
    enabled: false  # Enable in production for service-to-service calls
    tenant_id: "${AZURE_TENANT_ID:00000000-0000-0000-0000-000000000000}"
    client_id: "${AZURE_CLIENT_ID:00000000-0000-0000-0000-000000000000}"
    audience: "${AZURE_CLIENT_ID:00000000-0000-0000-0000-000000000000}"  # Defaults to client_id
    
    # Optional: Restrict to specific service principals (leave empty to allow all)
    allowed_service_principals: []
      # - "${WEB_JOB_MANAGED_IDENTITY_OID}"

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================

server:
  host: "0.0.0.0"
  port: 8000
  log_level: "${LOG_LEVEL:info}"