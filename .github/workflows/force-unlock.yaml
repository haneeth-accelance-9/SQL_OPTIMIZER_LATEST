name: Run Terraform force-unlock command

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: environment
        description: The environment for which to run this workflow
      lock_id:
        required: true
        type: string
        description: The lock ID specified in the error message

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.6.6' }}

jobs:
  unlock:
    environment: ${{ inputs.environment }}
    runs-on: [external-k8s-v2]
    container:
      image: official-dockerhub-images.artifactory.bayer.com/ubuntu:24.04
      credentials:
        username: ${{ vars.ARTIFACTORY_USER_NAME }}
        password: ${{ secrets.ARTIFACTORY_USER_TOKEN }}

    env:
      ARM_USE_OIDC: true
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_CLI: false
      TF_PLAN_FILE: ${{ github.sha }}.tfplan
      ENVIRONMENT: ${{ inputs.environment }}
      TF_RG_NAME: ${{ vars.AZURE_TF_RG_NAME }}
      TF_BACKEND_NAME: ${{ vars.AZURE_TF_BACKEND_NAME }}
      LOCK_ID: ${{ inputs.lock_id }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Install packages
        shell: bash
        working-directory: ./.github/workflows/scripts/
        run: |
          . install-terraform.sh && \
          . install-git.sh

      - name: Terraform Init
        working-directory: configuration
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_RG_NAME}" \
            -backend-config="storage_account_name=${TF_BACKEND_NAME}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${ENVIRONMENT}.tfstate"

      - name: Terraform Force Unlock
        working-directory: configuration
        run: |
          terraform force-unlock -force ${LOCK_ID}
