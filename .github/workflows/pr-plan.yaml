name: PR Plan

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - sandbox
      - dev
      - qa
      - prod

permissions:
  pull-requests: write
  contents: read
  id-token: write

env:
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.5.5' }}

jobs:
  validate_and_plan:
    name: Validate and Plan
    runs-on: [external-k8s-v2]
    environment: ${{ github.base_ref }}
    container:
      image: official-dockerhub-images.artifactory.bayer.com/ubuntu:24.04
      credentials:
        username: ${{ vars.ARTIFACTORY_REGISTRY_USER }}
        password: ${{ secrets.ARTIFACTORY_REGISTRY_PASSWORD }}
    env:
      ARM_USE_OIDC: true
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_CLI: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packages
        shell: bash
        working-directory: ./.github/workflows/scripts/
        run: |
          . install-terraform.sh && \
          . install-git.sh

      - name: Prepare
        run: |
          git config --global credential.helper 'store --file ~/.git-credentials'
          git config --global url."https://token:${{ secrets.ORG_REPOS_INTERNAL_READ_ONLY }}@github.com/bayer-int".insteadOf https://github.com/bayer-int

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Terraform Init
        working-directory: configuration
        run: |
          terraform version
          terraform init \
            -backend-config="resource_group_name=${{ vars.AZURE_TF_RG_NAME }}" \
            -backend-config="storage_account_name=${{ vars.AZURE_TF_BACKEND_NAME }}" \
            -backend-config="container_name=${{ vars.AZURE_TF_BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ github.base_ref }}.tfstate"

      - name: Terraform Validate
        working-directory: configuration
        run: terraform validate

      - name: Terraform Plan
        working-directory: configuration
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan
          {
            echo 'PLAN<<EOF'
            terraform show -no-color tfplan | sed -E 's/^([[:space:]]+)([-+])/\2\1/g'
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Create comment with plan
        uses: mshick/add-pr-comment@b8f338c590a895d50bcbfa6c5859251edc8952fc # v2.8.2
        with:
          message: |
            #### Terraform Plan for environment ${{ github.base_ref }} 📖 \`${{ steps.plan.outcome }}\`
            ```hcl
            ${{ env.PLAN }}
            ```
            *Pusher: @${{ github.actor }}, Action: ${{ github.event_name }}*
          message-id: plan
