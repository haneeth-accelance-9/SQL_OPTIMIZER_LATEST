  name: Deploy App to Container App                                                                                                                              

  on:
    workflow_dispatch:
      inputs:
        image_tag:
          required: false                                                                                                                                        
          description: "Image tag to deploy (defaults to latest)"
          default: latest                                                                                                                                        
          type: string                                                                                                                                           

  permissions:                                                                                                                                                   
    contents: read                                          
    id-token: write

  jobs:
    deploy:
      runs-on: ubuntu-latest
      environment: ${{ vars.BUILD_ENVIRONMENT || 'sandbox' }}                                                                                                    
      steps:
        - name: Azure Login (OIDC)                                                                                                                               
          uses: azure/login@v2                              
          with:                                                                                                                                                  
            client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}                                                                                    
            subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

        - name: Deploy to Container App                     
          run: |                                                                                                                                                 
            az containerapp update \                        
              --name ca-webapp-licagree-sandbox-gwc \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.PROJECT_NAME }}/app:${{ inputs.image_tag }}

