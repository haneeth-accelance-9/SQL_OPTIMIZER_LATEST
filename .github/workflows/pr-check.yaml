name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr-title:
    uses: bayer-int/dats-workflow-templates/.github/workflows/pr-check.yaml@main
    if: github.repository == 'bayer-int/smart-azure-subscription-template' && github.event.pull_request.draft == false
    with:
      pr_title: ${{ github.event.pull_request.title }}
      pr_body: ${{ github.event.pull_request.body }}

  test-coverage:
    name: Tests & Coverage (≥70%)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_optimizer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: sql_license_optimizer.settings
      SECRET_KEY: ci-insecure-key-not-used-in-production
      DB_HOST: localhost
      DB_NAME: test_optimizer
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        working-directory: app
        run: python manage.py migrate --no-input

      - name: Run pytest with coverage
        working-directory: app
        run: pytest

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./app/coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
